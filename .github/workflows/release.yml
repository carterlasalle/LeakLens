name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Build locked release artifacts
        run: uv build
      - name: Upload tagged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leaklens-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

